<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정진밥</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
body{
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: 20px auto;
    padding: 15px;
    background:#f5f5f5;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.meal{
    margin-bottom:20px;
    padding:10px;
    border-left:4px solid #4CAF50;
    background:#fafafa;
    white-space:pre-line;
}

.weekTable{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

.weekTable th,
.weekTable td{
    border:1px solid #ddd;
    padding:8px;
    text-align:left;
    vertical-align:top;
    white-space:pre-line;
}

.weekTable th{
    background:#eee;
}
</style>
</head>

<body>

<div class="card">

<h1>🍽 품질팀 식단표</h1>

<div id="today"></div>

<h2>이번주 식단</h2>

<div id="week"></div>

</div>

<script>

const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTtKMekb2nYu-VuOimjku0-de3Rg2glOTry6b7ywWMCsLOOlxJ6n8bGHsFYhKFX-zoILwmx6yehKsv7/pub?gid=0&single=true&output=csv";

Papa.parse(csvUrl, {
    download: true,
    skipEmptyLines: true,

    complete: function(results) {

        const data = results.data.slice(1);

        const todayMap = {
            1: "월",
            2: "화",
            3: "수",
            4: "목",
            5: "금",
            6: "토"
        };

        const today = todayMap[new Date().getDay()];
        const todayData = data.find(row => row[0] && row[0].trim() === today);

        if (todayData) {

            document.getElementById("today").innerHTML = `
                <h2>오늘 메뉴 (${today}요일)</h2>

                <div class="meal">
🌅 조식

${todayData[1] || ""}
                </div>

                <div class="meal">
🍱 중식

${todayData[2] || ""}
                </div>

                <div class="meal">
🌙 석식

${todayData[3] || ""}
                </div>
            `;
        }

        let weekHtml = `
            <details>
                <summary style="cursor:pointer;font-size:20px;font-weight:bold;">
                    📅 이번주 식단 보기
                </summary>
        `;

        data.forEach(row => {

            if (!row[0]) return;

            weekHtml += `
                <div class="meal">

<b>${row[0]}요일</b>

🌅 조식
${row[1] || ""}

🍱 중식
${row[2] || ""}

🌙 석식
${row[3] || ""}

                </div>
            `;
        });

        weekHtml += "</details>";

        document.getElementById("week").innerHTML = weekHtml;
    }
});

</script>

</body>
</html>
